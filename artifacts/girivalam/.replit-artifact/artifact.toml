kind = "mobile"
previewPath = "/"
title = "Girivalam Pilgrim Guide"
version = "1.0.0"
id = "artifacts/girivalam"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22771

[services.development]
run = "pnpm --filter @workspace/girivalam run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/girivalam", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/girivalam", "run", "serve" ]

[services.env]
PORT = "22771"
BASE_PATH = "/"
